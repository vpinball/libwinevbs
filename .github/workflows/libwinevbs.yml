name: libwinevbs
on:
  push:
  pull_request:

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  version:
    name: Detect version
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: version
        run: |
          VERSION_MAJOR=$(grep -Eo "LIBWINEVBS_VERSION_MAJOR\s+[0-9]+" include/libwinevbs.h | grep -Eo "[0-9]+")
          VERSION_MINOR=$(grep -Eo "LIBWINEVBS_VERSION_MINOR\s+[0-9]+" include/libwinevbs.h | grep -Eo "[0-9]+")
          VERSION_PATCH=$(grep -Eo "LIBWINEVBS_VERSION_PATCH\s+[0-9]+" include/libwinevbs.h | grep -Eo "[0-9]+")
          TAG="${VERSION_MAJOR}.${VERSION_MINOR}.${VERSION_PATCH}"
          echo "${TAG}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

  build:
    name: Build libwinevbs-${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    needs: [ version ]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-2025-vs2026, platform: win-mingw, arch: x64 }
          - { os: macos-15, platform: macos, arch: arm64 }
          - { os: macos-15, platform: macos, arch: x64 }
          - { os: ubuntu-24.04, platform: linux, arch: x64 }
          - { os: ubuntu-24.04-arm, platform: linux, arch: aarch64 }
          - { os: ubuntu-24.04, platform: android, arch: arm64-v8a }
          - { os: macos-15, platform: ios, arch: arm64 }
          - { os: macos-15, platform: ios-simulator, arch: arm64 }
    steps:
      - uses: actions/checkout@v6
      #
      # install dependencies
      #
      - if: (matrix.platform == 'win-mingw')
        run: |
          /c/msys64/usr/bin/bash.exe -l -c "pacman -S --noconfirm \
            bison \
            mingw-w64-ucrt-x86_64-gcc \
            mingw-w64-ucrt-x86_64-cmake \
            mingw-w64-ucrt-x86_64-tools"
      - if: (matrix.platform == 'macos' || matrix.platform == 'ios' || matrix.platform == 'ios-simulator')
        run: |
          brew install bison
          echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH
      - if: (matrix.platform == 'linux')
        run: |
          sudo apt-get update
          sudo apt install bison
      #
      # build (win-mingw)
      #
      - if: (matrix.platform == 'win-mingw')
        name: Build (win-mingw)
        run: |
          CURRENT_DIR="$(pwd)"
          MSYSTEM=UCRT64 /c/msys64/usr/bin/bash.exe -l -c "
            cd \"${CURRENT_DIR}\" &&
            cmake \
              -DCMAKE_BUILD_TYPE=Release \
              -DPLATFORM=${{ matrix.platform }} \
              -DARCH=${{ matrix.arch }} \
              -B build &&
            cmake --build build -- -j\$(nproc)
          "
      #
      # build (macos)
      #
      - if: (matrix.platform == 'macos')
        name: Build (macos)
        run: |
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DPLATFORM=${{ matrix.platform }} \
            -DARCH=${{ matrix.arch }} \
            -B build
          cmake --build build -- -j$(sysctl -n hw.ncpu)
      #
      # build (linux)
      #
      - if: (matrix.platform == 'linux')
        name: Build (linux)
        run: |
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DPLATFORM=${{ matrix.platform }} \
            -DARCH=${{ matrix.arch }} \
            -B build
          cmake --build build -- -j$(nproc)
      #
      # build (ios)
      #
      - if: (matrix.platform == 'ios' || matrix.platform == 'ios-simulator')
        name: Build (ios)
        run: |
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DPLATFORM=${{ matrix.platform }} \
            -DARCH=${{ matrix.arch }} \
            -B build
          cmake --build build -- -j$(sysctl -n hw.ncpu)
      #
      # build (android)
      #
      - if: (matrix.platform == 'android')
        name: Build (android)
        run: |
          cmake \
            -DCMAKE_BUILD_TYPE=Release \
            -DPLATFORM=${{ matrix.platform }} \
            -DARCH=${{ matrix.arch }} \
            -B build
          cmake --build build -- -j$(nproc)
      #
      # prepare artifacts
      #
      - if: (matrix.platform == 'win-mingw')
        name: Prepare artifacts (win-mingw)
        run: |
          mkdir tmp
          cp build/winevbs64.dll tmp/
          cp build/libwinevbs64.dll.a tmp/
          cp build/libwinevbs64.a tmp/
          cd tmp && 7z a -r ../libwinevbs-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}.zip *
      - if: (matrix.platform == 'macos')
        name: Prepare artifacts (macos)
        run: |
          mkdir tmp
          cp build/libwinevbs.a tmp/
          cp -a build/*.dylib tmp/
          cd tmp && tar -czvf ../libwinevbs-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz *
      - if: (matrix.platform == 'linux')
        name: Prepare artifacts (linux)
        run: |
          mkdir tmp
          cp build/libwinevbs.a tmp/
          cp -a build/*.so tmp/
          cp -a build/*.so.* tmp/
          cd tmp && tar -czvf ../libwinevbs-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz *
      - if: (matrix.platform == 'ios' || matrix.platform == 'ios-simulator')
        name: Prepare artifacts (ios)
        run: |
          mkdir tmp
          cp build/libwinevbs.a tmp/
          cp -a build/*.dylib tmp/
          cd tmp && tar -czvf ../libwinevbs-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz *
      - if: (matrix.platform == 'android')
        name: Prepare artifacts (android)
        run: |
          mkdir tmp
          cp build/libwinevbs.a tmp/
          cp build/libwinevbs.so tmp/
          cd tmp && tar -czvf ../libwinevbs-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz *
      #
      # upload artifacts
      #
      - if: (matrix.platform == 'win-mingw')
        uses: actions/upload-artifact@v7
        with:
          name: libwinevbs-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}.zip
          path: libwinevbs-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}.zip
          archive: false
      - if: (matrix.platform != 'win-mingw')
        uses: actions/upload-artifact@v7
        with:
          name: libwinevbs-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
          path: libwinevbs-${{ needs.version.outputs.tag }}-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz
          archive: false

  post-build:
    runs-on: macos-15
    needs: [ version, build ]
    name: Build libwinevbs-macos
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: libwinevbs-${{ needs.version.outputs.tag }}-macos-x64.tar.gz
          skip-decompress: true
      - uses: actions/download-artifact@v8
        with:
          name: libwinevbs-${{ needs.version.outputs.tag }}-macos-arm64.tar.gz
          skip-decompress: true
      - name: Combine macos architectures
        run: |
          mkdir macos-x64 macos-arm64
          tar -xzvf libwinevbs-${{ needs.version.outputs.tag }}-macos-x64.tar.gz -C macos-x64
          tar -xzvf libwinevbs-${{ needs.version.outputs.tag }}-macos-arm64.tar.gz -C macos-arm64
          mkdir tmp
          find macos-arm64 -name "*.dylib" | while read -r file; do
            if [ -L "$file" ]; then
              cp -a "$file" "tmp/"
            elif [ -f "$file" ]; then
              filename=$(basename "$file")
              lipo -create -output "tmp/$filename" \
                "macos-arm64/$filename" \
                "macos-x64/$filename"
            fi
          done
          cd tmp && tar -czvf ../libwinevbs-${{ needs.version.outputs.tag }}-macos.tar.gz * && cd ..
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: libwinevbs-${{ needs.version.outputs.tag }}-macos.tar.gz
          path: libwinevbs-${{ needs.version.outputs.tag }}-macos.tar.gz
          archive: false
      - if: startsWith(github.ref, 'refs/tags/')
        uses: actions/download-artifact@v8
        with:
          path: release
          skip-decompress: true
      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          files: release/**/*
